; ==============================================================
; Asterisk Dialplan
; ==============================================================
; Wählplan:
;   1001 → TTS-Client (Anrufbeantworter)
;   1002 → Externes Softphone
;   *99  → Echo-Test (hört sich selbst)
;
; Dialplan Applications (Answer, Dial, Playback, Echo, Hangup, NoOp, ...):
;   https://docs.asterisk.org/Asterisk_22_Documentation/API_Documentation/Dialplan_Applications/
;
; In der Asterisk CLI auflisten:
;   core show applications
;   core show application <Name>
; ==============================================================

[default]

; Anruf an pjsip_live_transcribe.py (1001)
exten => 1001,1,NoOp(Anruf an callee_live-transcribe-Client 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()

; Anruf an Softphone (1002)
exten => 1002,1,NoOp(Anruf an Softphone 1002)
 same => n,Dial(PJSIP/1002,30)
 same => n,Hangup()

; Anruf an pjsip_autoanswer_tts_n_wav.py (1003)
exten => 1003,1,NoOp(Anruf an pjsip_autoanswer_tts_n_wav-Client 1003)
 same => n,Dial(PJSIP/1003,30)
 same => n,Hangup()

; Anruf an pjsip_realtime_tts.py (1004)
exten => 1004,1,NoOp(Anruf an pjsip_realtime_tts-Client 1004)
 same => n,Dial(PJSIP/1004,30)
 same => n,Hangup()

; Echo-Test: Spielt zurück was man sagt
; Sounds: Built-in Asterisk Sound Files (/var/lib/asterisk/sounds/)
; https://www.voip-info.org/asterisk-sound-files/
; https://docs.asterisk.org/Deployment/Internationalization-and-Localization/Asterisk-Sounds-Packages/About-the-Sounds-Tools/
exten => *99,1,NoOp(Echo-Test)
 same => n,Answer()
 same => n,Playback(demo-echotest)           ; "This is an echo test..."
 same => n,Echo()
 same => n,Hangup()

; Alle anderen Nummern
exten => _X.,1,NoOp(Unbekannte Nummer: ${EXTEN})
 same => n,Playback(ss-noservice)             ; "I'm sorry, that number is not in service"
 same => n,Hangup()
