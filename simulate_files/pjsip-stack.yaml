# =============================================================
# PJSIP Stack – Kubernetes Pod YAML für podman kube play
# =============================================================
# Startet einen Pod mit Asterisk SIP-Server und PJSIP TTS Client.
#
# Verwendung:
#   podman kube play pjsip-stack.yaml
#   podman kube down pjsip-stack.yaml
#
# Oder über stack.sh:
#   ./stack.sh start
#   ./stack.sh stop
# =============================================================
apiVersion: v1
kind: Pod
metadata:
  name: pjsip-stack
spec:
  hostNetwork: true
  containers:
    # ---- Asterisk SIP-Server ------------------------------------
    - name: asterisk
      image: docker.io/andrius/asterisk:latest
      restartPolicy: OnFailure
      volumeMounts:
        - name: conf-pjsip
          mountPath: /etc/asterisk/pjsip.conf
          readOnly: true
        - name: conf-extensions
          mountPath: /etc/asterisk/extensions.conf
          readOnly: true
        - name: conf-rtp
          mountPath: /etc/asterisk/rtp.conf
          readOnly: true
        - name: conf-modules
          mountPath: /etc/asterisk/modules.conf
          readOnly: true
      # Probe: exec statt tcpSocket/httpGet, weil podman diese intern
      # zu nc/curl konvertiert — beides im Asterisk-Image nicht vorhanden.
      # startupProbe/readinessProbe werden von podman kube play ignoriert.
      livenessProbe:
        exec:
          command: ["asterisk", "-rx", "core show version"]
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 3

    # ---- PJSIP Autoanswer + TTS + Transcription -----------------
    - name: pjsip-autoanswer-transcribe
      image: xomoxcc/sipstuff:latest
      # CUDA:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-noopenvino
      # OpenVINO: xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-nocuda-openvino
      # Both:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-openvino
      restartPolicy: Always
      # --- GPU: uncomment ONE of the following sections ---
      # CUDA:
      #   resources:
      #     limits:
      #       nvidia.com/gpu: "1"
      # OpenVINO (Intel GPU):
      #   securityContext:
      #     supplementalGroups: [226, 993, 128]
      #   volumeMounts (add to existing list):
      #     - name: dri-render
      #       mountPath: /dev/dri/renderD128
      # volumes (add to spec.volumes):
      #   - name: dri-render
      #     hostPath:
      #       path: /dev/dri/renderD128
      #       type: CharDevice
      command: ["sipstuff-cli"]
      args:
        - callee_live-transcribe
        - --server
        - "127.0.0.1"
        - --user
        - "1001"
        - --password
        - "geheim1001"
        - --local-port
        - "5062"
        - --piper-model
        - de_DE-thorsten-high
        - --tts-data-dir
        - /piper-models
        - --tts-text
        - "Willkommen! Sie sind mit dem automatischen Anrufbeantworter verbunden. ... Bitte hinterlassen Sie eine Nachricht nach dem Signalton."
        - --wav-dir
        - /recordings
        - --stt-model
        - large-v3
        - --stt-live-model
        - base
        - --stt-data-dir
        - /whisper-models
        - --stt-language
        - de
        - --transcribe
      env:
        - name: LOG_LEVEL
          value: "3"
        # PulseAudio:
        # - name: PULSE_SERVER
        #   value: "unix:/run/user/1200/pulse/native"
      # die nachfolgenden script-mounts brauchen im Dockerfile das pip install mit "-e"
      volumeMounts:
        # PulseAudio:
        # - name: pulse-socket
        #   mountPath: /run/user/1200/pulse
        - name: tts-realtime-script
          mountPath: /app/sipstuff/realtime/pjsip_realtime_tts.py
          readOnly: true
        - name: tts-transcribe-script
          mountPath: /app/sipstuff/transcribe/pjsip_live_transcribe.py
          readOnly: true
        - name: autoanswer-script
          mountPath: /app/sipstuff/autoanswer/pjsip_autoanswer_tts_n_wav.py
          readOnly: true
        - name: piper-models
          mountPath: /piper-models
          readOnly: true
        - name: whisper-models
          mountPath: /whisper-models
          readOnly: true
        - name: recordings
          mountPath: /recordings

    # ---- PJSIP Autoanswer (TTS only) ------------------------------
    - name: pjsip-autoanswer
      image: xomoxcc/sipstuff:latest
      # CUDA:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-noopenvino
      # OpenVINO: xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-nocuda-openvino
      # Both:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-openvino
      restartPolicy: Always
      # --- GPU: uncomment ONE of the following sections ---
      # CUDA:
      #   resources:
      #     limits:
      #       nvidia.com/gpu: "1"
      # OpenVINO (Intel GPU):
      #   securityContext:
      #     supplementalGroups: [226, 993, 128]
      #   volumeMounts (add to existing list):
      #     - name: dri-render
      #       mountPath: /dev/dri/renderD128
      # volumes (add to spec.volumes):
      #   - name: dri-render
      #     hostPath:
      #       path: /dev/dri/renderD128
      #       type: CharDevice
      command: ["sipstuff-cli"]
      args:
        - callee_autoanswer
        - --server
        - "127.0.0.1"
        - --user
        - "1003"
        - --password
        - "geheim1003"
        - --local-port
        - "5063"
        - --mode
        - tts
        - --piper-model
        - de_DE-thorsten-high
        - --tts-data-dir
        - /piper-models
        - --tts-text
        - "Willkommen! Sie sind mit dem automatischen Anrufbeantworter verbunden."
        - --answer-delay
        - "1.0"
      env:
        - name: LOG_LEVEL
          value: "3"
        # PulseAudio:
        # - name: PULSE_SERVER
        #   value: "unix:/run/user/1200/pulse/native"
      volumeMounts:
        # PulseAudio:
        # - name: pulse-socket
        #   mountPath: /run/user/1200/pulse
        - name: autoanswer-script
          mountPath: /app/sipstuff/autoanswer/pjsip_autoanswer_tts_n_wav.py
          readOnly: true
        - name: piper-models
          mountPath: /piper-models
          readOnly: true

    # ---- PJSIP Realtime TTS ----------------------------------------
    - name: pjsip-realtime-tts
      image: xomoxcc/sipstuff:latest
      # CUDA:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-noopenvino
      # OpenVINO: xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-nocuda-openvino
      # Both:    xomoxcc/sipstuff:python-3.14-slim-trixie-pjsip_2.16-cuda-openvino
      restartPolicy: Always
      # --- GPU: uncomment ONE of the following sections ---
      # CUDA:
      #   resources:
      #     limits:
      #       nvidia.com/gpu: "1"
      # OpenVINO (Intel GPU):
      #   securityContext:
      #     supplementalGroups: [226, 993, 128]
      #   volumeMounts (add to existing list):
      #     - name: dri-render
      #       mountPath: /dev/dri/renderD128
      # volumes (add to spec.volumes):
      #   - name: dri-render
      #     hostPath:
      #       path: /dev/dri/renderD128
      #       type: CharDevice
      command: ["sipstuff-cli"]
      args:
        - callee_realtime-tts
        - --server
        - "127.0.0.1"
        - --user
        - "1004"
        - --password
        - "geheim1004"
        - --local-port
        - "5064"
        - --piper-model
        - /piper-models/de_DE-thorsten-high.onnx
        - --tts-text
        - "Willkommen! Sie sind mit dem Echtzeit-TTS-Client verbunden."
        - --answer-delay
        - "1.0"
        - --interactive
        - --stt-model
        - base
        - --stt-data-dir
        - /whisper-models
        - --stt-language
        - de
      env:
        - name: LOG_LEVEL
          value: "3"
        # PulseAudio:
        # - name: PULSE_SERVER
        #   value: "unix:/run/user/1200/pulse/native"
      volumeMounts:
        # PulseAudio:
        # - name: pulse-socket
        #   mountPath: /run/user/1200/pulse
        - name: tts-realtime-script
          mountPath: /app/sipstuff/realtime/pjsip_realtime_tts.py
          readOnly: true
        - name: piper-models
          mountPath: /piper-models
          readOnly: true
        - name: whisper-models
          mountPath: /whisper-models
          readOnly: true
  volumes:
    - name: conf-pjsip
      hostPath:
        path: ./pjsip.conf
        type: File
    - name: conf-extensions
      hostPath:
        path: ./extensions.conf
        type: File
    - name: conf-rtp
      hostPath:
        path: ./rtp.conf
        type: File
    - name: conf-modules
      hostPath:
        path: ./modules.conf
        type: File
    - name: tts-realtime-script
      hostPath:
        path: ../sipstuff/realtime/pjsip_realtime_tts.py
        type: File
    - name: tts-transcribe-script
      hostPath:
        path: ../sipstuff/transcribe/pjsip_live_transcribe.py
        type: File
    - name: autoanswer-script
      hostPath:
        path: ../sipstuff/autoanswer/pjsip_autoanswer_tts_n_wav.py
        type: File
    - name: piper-models
      hostPath:
        path: ../sipstuff_data.local/piper-models
        type: Directory
    - name: whisper-models
      hostPath:
        path: ../sipstuff_data.local/whisper-models
        type: Directory
    - name: recordings
      hostPath:
        path: ../sipstuff_data.local/recordings_callee
        type: Directory
    # PulseAudio:
    # - name: pulse-socket
    #   hostPath:
    #     path: /run/user/1000/pulse
    #     type: Directory
