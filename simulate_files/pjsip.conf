; ==============================================================
; Asterisk PJSIP Konfiguration
; ==============================================================
; SIP-Accounts:
;   1001 – PJSIP Live-Transcribe Client (automatisch registriert im Container)
;   1002 – Externes Softphone (zum Testen aus dem LAN)
;   1003 – PJSIP Autoanswer TTS Client (automatisch registriert im Container)
;   1004 – PJSIP Realtime TTS Client (automatisch registriert im Container)
; ==============================================================

; --- Transport ---------------------------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; --- Account 1001 (TTS-Client) ----------------------------------

[1001]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
allow=g722
auth=1001
aors=1001
callerid="TTS Client" <1001>
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[1001]
type=auth
auth_type=userpass
username=1001
password=geheim1001

[1001]
type=aor
max_contacts=5
remove_existing=yes
default_expiration=120

