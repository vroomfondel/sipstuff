; ==============================================================
; Asterisk PJSIP Konfiguration
; ==============================================================
; Zwei SIP-Accounts:
;   1001 – PJSIP TTS Client (automatisch registriert im Container)
;   1002 – Externes Softphone (zum Testen aus dem LAN)
; ==============================================================

; --- Transport ---------------------------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; --- Account 1001 (TTS-Client) ----------------------------------

[1001]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
allow=g722
auth=1001
aors=1001
callerid="TTS Client" <1001>
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[1001]
type=auth
auth_type=userpass
username=1001
password=geheim1001

[1001]
type=aor
max_contacts=5
remove_existing=yes
default_expiration=120

; --- Account 1002 (Externes Softphone) --------------------------

[1002]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
allow=g722
auth=1002
aors=1002
callerid="Softphone" <1002>
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[1002]
type=auth
auth_type=userpass
username=1002
password=geheim1002

[1002]
type=aor
max_contacts=5
remove_existing=yes
default_expiration=120
